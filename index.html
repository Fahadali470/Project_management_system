<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>TaskFlow Pro — Project Management for Modern Teams</title>
    <meta
      name="description"
      content="TaskFlow Pro is a production-ready SaaS project management tool. Organize tasks, collaborate with your team, and ship faster with Kanban boards, real-time updates, and powerful analytics."
    />
    <meta name="keywords" content="project management, kanban board, task tracking, team collaboration, agile, scrum" />
    <meta name="author" content="TaskFlow Pro" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />

      property="og:description"
      content="Organize tasks, collaborate with your team, and ship faster with Kanban boards and real-time updates."

      name="twitter:description"
      content="Organize tasks, collaborate with your team, and ship faster with Kanban boards and real-time updates."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"

    <meta name="theme-color" content="#6366f1" />
